name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: vividvitablendsdev/vividvitablends

jobs:
  security-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12

      - name: Backend Security Audit
        env:
          HUSKY: "0"
        run: |
          cd backend
          npm ci
          npm audit --audit-level=high

      - name: Frontend Security Audit
        env:
          HUSKY: "0"
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=high

      - name: Scan Dockerfiles
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-config-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload config scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-config-results.sarif') != ''
        with:
          sarif_file: trivy-config-results.sarif
          category: dockerfile-config

  build-and-push:
    runs-on: ubuntu-latest
    needs: security-audit
    permissions:
      security-events: write
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          no-cache: true
          tags: |
            ${{ env.IMAGE_NAME }}:backend-latest
            ${{ env.IMAGE_NAME }}:backend-${{ github.sha }}
        timeout-minutes: 15

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:backend-${{ github.sha }}
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-backend-results.sarif

      - name: Upload backend scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-backend-results.sarif') != ''
        with:
          sarif_file: trivy-backend-results.sarif
          category: backend-image


      - name: Build & Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          no-cache: true
          tags: |
            ${{ env.IMAGE_NAME }}:frontend-latest
            ${{ env.IMAGE_NAME }}:frontend-${{ github.sha }}
        timeout-minutes: 15

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:frontend-${{ github.sha }}
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-frontend-results.sarif

      - name: Upload frontend scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-frontend-results.sarif') != ''
        with:
          sarif_file: trivy-frontend-results.sarif
          category: frontend-image

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}

          envs: DOCKER_USERNAME,DOCKER_TOKEN,DATABASE_URL,DIRECT_URL,JWT_SECRET,JWT_REFRESH_SECRET,POSTGRES_PASSWORD,CORS_ORIGIN,REDIS_PASSWORD,R2_ACCOUNT_ID,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET_NAME,R2_PUBLIC_BUCKET_ID
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          JWT_REFRESH_EXPIRES_IN: ${{ secrets.JWT_REFRESH_EXPIRES_IN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_BUCKET_ID: ${{ secrets.R2_PUBLIC_BUCKET_ID }}
          script: |
            set -e
            cd /opt/vivid_vitablends

            git fetch origin
            git reset --hard origin/main

            # Create root .env file for Docker Compose
            install -m 600 /dev/null .env
            cat > .env <<EOF
            NODE_ENV=production
            PORT=5000
            DATABASE_URL=${DATABASE_URL}
            DIRECT_URL=${DIRECT_URL}
            JWT_SECRET=${JWT_SECRET}
            JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
            JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
            JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            CORS_ORIGIN=${CORS_ORIGIN}
            REDIS_ENABLED=true
            REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
            REDIS_PASSWORD=${REDIS_PASSWORD}
            REDIS_TTL=3600
            R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
            R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
            R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
            R2_BUCKET_NAME=${R2_BUCKET_NAME}
            R2_PUBLIC_BUCKET_ID=${R2_PUBLIC_BUCKET_ID}
            EOF

            chmod +x deploy.sh
            ./deploy.sh

      - name: Health Check
        run: |
          echo "Waiting for app to be ready..."
          for i in $(seq 1 12); do
            if curl --silent --fail http://${{ secrets.VM_HOST }}:8000/api/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/12 failed, waiting 10s..."
            sleep 10
          done
          echo "Health check failed after 2 minutes"
          exit 1

  notify:
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: always()
    steps:
      - name: Discord notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ needs.deploy.result }}
          title: "Deployment to VM"
          description: "Deployment pipeline completed"
          url: ${{ github.event.head_commit.url }}
          username: GitHub Actions
