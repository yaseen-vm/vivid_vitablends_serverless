name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: vividvitablendsdev/vividvitablends

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Backend Security Audit
        run: |
          cd backend
          npm audit --audit-level=high

      - name: Frontend Security Audit
        run: |
          cd frontend
          npm audit --audit-level=high

  build-and-push:
    runs-on: ubuntu-latest
    needs: security-audit

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:backend-latest
            ${{ env.IMAGE_NAME }}:backend-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:backend-latest
          cache-to: type=inline
        timeout-minutes: 15

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:backend-latest
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'

      - name: Upload backend scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend-results.sarif'
          category: 'backend-image'

      - name: Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:backend-latest
            ${{ env.IMAGE_NAME }}:backend-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:backend-latest
          cache-to: type=inline
        timeout-minutes: 15

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:frontend-latest
            ${{ env.IMAGE_NAME }}:frontend-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:frontend-latest
          cache-to: type=inline
        timeout-minutes: 15

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:frontend-latest
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'

      - name: Upload frontend scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend-results.sarif'
          category: 'frontend-image'

      - name: Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:frontend-latest
            ${{ env.IMAGE_NAME }}:frontend-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:frontend-latest
          cache-to: type=inline
        timeout-minutes: 15

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_BUCKET_ID: ${{ secrets.R2_PUBLIC_BUCKET_ID }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          envs: DOCKER_USERNAME,DOCKER_TOKEN,DATABASE_URL,DIRECT_URL,JWT_SECRET,POSTGRES_PASSWORD,CORS_ORIGIN,REDIS_PASSWORD,R2_ACCOUNT_ID,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET_NAME,R2_PUBLIC_BUCKET_ID
          script: |
            set -e
            
            if [ ! -d "/opt/vivid_vitablends" ]; then
              sudo mkdir -p /opt/vivid_vitablends
              sudo chown $USER:$USER /opt/vivid_vitablends
              cd /opt/vivid_vitablends
              git clone https://github.com/${{ github.repository }} .
            else
              cd /opt/vivid_vitablends
              git fetch origin
              git reset --hard origin/main
            fi

            cat > .env <<EOF
            DATABASE_URL=${DATABASE_URL}
            DIRECT_URL=${DIRECT_URL}
            JWT_SECRET=${JWT_SECRET}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            CORS_ORIGIN=${CORS_ORIGIN}
            REDIS_PASSWORD=${REDIS_PASSWORD}
            R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
            R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
            R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
            R2_BUCKET_NAME=${R2_BUCKET_NAME}
            R2_PUBLIC_BUCKET_ID=${R2_PUBLIC_BUCKET_ID}
            EOF

            chmod +x deploy.sh
            ./deploy.sh

      - name: Health Check
        run: |
          echo "Waiting for app..."
          sleep 60
          curl --retry 5 --retry-delay 10 --fail http://${{ secrets.VM_HOST }}:8000/api/health

  notify:
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: always()
    steps:
      - name: Discord notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ needs.deploy.result }}
          title: "Deployment to VM"
          description: "Deployment pipeline completed"
          url: ${{ github.event.head_commit.url }}
          username: GitHub Actions
